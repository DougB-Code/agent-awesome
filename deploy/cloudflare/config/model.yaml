# This file configures the pilot harness model provider for Cloudflare.
default: openai:gpt-5.4-mini
providers:
  openai:
    adapter: openai
    auth: required
    api-key: OPENAI_API_KEY
    default: gpt-5.4-mini
    url: https://api.openai.com/v1/chat/completions
    models:
      - id: gpt-5.4-mini
        model: gpt-5.4-mini
