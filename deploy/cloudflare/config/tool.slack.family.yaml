# This file configures read-only Family tools for Slack-driven harness turns.
local-exec:
  enabled: false
  allow-persistent-approvals: false
mcp:
  enabled: true
  servers:
    - name: memory
      transport: streamable-http
      endpoint: http://127.0.0.1:8091/mcp
      tools:
        allow:
          - search_memory
          - search_sources
          - load_entity_page
          - load_timeline
          - query_context_graph
          - get_task
          - list_tasks
          - task_graph_projection
          - project_executive_summary
          - explain_executive_summary_item
          - list_task_relations
          - traverse_task_relations
