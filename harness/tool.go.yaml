# This file configures reusable Go command node presets for coding workflows.
local-exec:
  enabled: true
  default-timeout: 10m
  default-max-output-bytes: 1048576
  commands:
    - name: go_build_all
      executable: go
      description: Compile every Go package in the selected repository.
      args:
        - build
        - ./...
      timeout: 10m
      max-output-bytes: 1048576
    - name: go_test_all
      executable: go
      description: Run every Go test in the selected repository.
      args:
        - test
        - ./...
      timeout: 20m
      max-output-bytes: 1048576
    - name: go_build_binary
      executable: go
      description: Build one Go command package to a configured binary path.
      args:
        - build
        - -o
        - "{{binary_path}}"
        - "{{package}}"
      timeout: 10m
      max-output-bytes: 1048576
    - name: binary_execute_two_args
      executable: "{{binary_path}}"
      description: Invoke a configured binary with two positional arguments.
      args:
        - "{{arg_1}}"
        - "{{arg_2}}"
      timeout: 2m
      max-output-bytes: 1048576
mcp:
  enabled: false
node-presets:
  - id: go_build_all
    label: Go build all
    surface: command
    action: command.execute
    description: Compile every Go package from the node working directory.
    arguments:
      template_id: go_build_all
  - id: go_test_all
    label: Go test all
    surface: command
    action: command.execute
    description: Run every Go test from the node working directory.
    arguments:
      template_id: go_test_all
  - id: go_build_binary
    label: Go build binary
    surface: command
    action: command.execute
    description: Build one Go command package into a configured binary.
    arguments:
      template_id: go_build_binary
  - id: binary_execute_two_args
    label: Invoke binary
    surface: command
    action: command.execute
    description: Invoke a configured binary with two positional arguments.
    arguments:
      template_id: binary_execute_two_args
validations:
  - id: go_build_all_success
    label: Go build success
    mode: mocked
    target:
      type: workflow-node
      preset-id: go_build_all
    description: Command boundary returns a successful Go build result.
    input:
      cwd: /tmp/repository
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
    expected:
      status: succeeded
  - id: go_test_all_failure
    label: Go test failure
    mode: mocked
    target:
      type: workflow-node
      preset-id: go_test_all
    description: Command boundary returns a failed Go test result.
    input:
      cwd: /tmp/repository
    mocks:
      command.execute:
        status: failed
        exit_code: 1
    expected:
      status: failed
  - id: go_build_binary_success
    label: Go binary build success
    mode: mocked
    target:
      type: workflow-node
      preset-id: go_build_binary
    description: Command boundary returns a successful binary build result.
    input:
      binary_path: build/app
      package: .
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
    expected:
      status: succeeded
  - id: binary_execute_success
    label: Binary invoke success
    mode: mocked
    target:
      type: workflow-node
      preset-id: binary_execute_two_args
    description: Command boundary returns a successful binary invocation result.
    input:
      binary_path: build/app
      arg_1: "12"
      arg_2: "3"
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
    expected:
      status: succeeded
