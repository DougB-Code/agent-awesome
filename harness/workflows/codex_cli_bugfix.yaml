# This workflow runs a real Codex CLI bug-fix pass through AA's command boundary.
apiVersion: aa.workflow/v1
kind: workflow
id: codex_cli_bugfix
name: Codex CLI Bugfix
description: Find and fix one real bug by invoking the configured Codex CLI command template.
nodes:
  - id: codex_bugfix
    type: command
    tool: codex_bugfix
    timeout: 30m
    with:
      cwd: "${body.value.repository_path}"
      parameters:
        prompt_file: "${body.value.prompt_file}"
        events_file: "${body.value.events_file}"
        last_message_file: "${body.value.last_message_file}"
        stderr_file: "${body.value.stderr_file}"
