# This workflow runs a professional coding change through generic AA boundaries.
apiVersion: aa.workflow/v1
kind: state_machine
id: professional_coding_change
name: Professional Coding Change
description: Prepare an aa-* worktree, run a configured coding agent, verify Go builds and tests, then commit and push for review.
initial: intake
states:
  - id: intake
    on_entry:
      - id: normalized_input
        uses: data.defaults
        with:
          input: ${workflow_input}
          defaults:
            branch_summary: ${workflow_input.change_request}
            commit_message: ${workflow_input.change_request}
            base_ref: HEAD
            remote: origin
            binary_path: ./.agent-awesome/aa-workflow-binary
            binary_package: .
            binary_arg_1: ""
            binary_arg_2: ""
            codex_home: ""
      - id: assert_input
        uses: data.assert
        with:
          path: normalized_input
          mode: schema
          schema:
            type: object
            required:
              - repository_path
              - change_request
              - branch_summary
              - commit_message
              - base_ref
              - remote
              - binary_path
              - binary_package
              - binary_arg_1
              - binary_arg_2
              - codex_home
            properties:
              repository_path:
                type: string
                minLength: 1
              change_request:
                type: string
                minLength: 1
              branch_summary:
                type: string
              commit_message:
                type: string
              base_ref:
                type: string
              remote:
                type: string
              binary_path:
                type: string
              binary_package:
                type: string
              binary_arg_1:
                type: string
              binary_arg_2:
                type: string
              codex_home:
                type: string
    transitions:
      - trigger: succeeded
        to: source_control_prep
      - trigger: failed
        to: operator_review

  - id: source_control_prep
    on_entry:
      - id: prepare_worktree
        uses: mcp.call
        with:
          server_id: sourcecontrol
          tool: sourcecontrol.prepare_worktree
          arguments:
            repository_path: ${normalized_input.repository_path}
            branch_prefix: aa
            branch_summary: ${normalized_input.branch_summary}
            base_ref: ${normalized_input.base_ref}
    transitions:
      - trigger: succeeded
        to: agent_implementation
      - trigger: failed
        to: operator_review

  - id: agent_implementation
    initial: codex_cli
    states:
      - id: codex_cli
        on_entry:
          - id: implement_change
            uses: command.execute
            with:
              template_id: codex_implement
              cwd: ${prepare_worktree.worktree_path}
              parameters:
                change_request: ${normalized_input.change_request}
                repository_path: ${normalized_input.repository_path}
                worktree_path: ${prepare_worktree.worktree_path}
                branch: ${prepare_worktree.branch}
                codex_home: ${normalized_input.codex_home}
    transitions:
      - trigger: succeeded
        to: go_verification
      - trigger: failed
        to: operator_review

  - id: go_verification
    initial: go_build
    states:
      - id: go_build
        on_entry:
          - id: go_build_all
            uses: command.execute
            with:
              template_id: go_build_all
              cwd: ${prepare_worktree.worktree_path}
        transitions:
          - trigger: succeeded
            to: go_test
      - id: go_test
        on_entry:
          - id: go_test_all
            uses: command.execute
            with:
              template_id: go_test_all
              cwd: ${prepare_worktree.worktree_path}
        transitions:
          - trigger: succeeded
            to: go_build_binary
      - id: go_build_binary
        on_entry:
          - id: go_build_binary
            uses: command.execute
            with:
              template_id: go_build_binary
              cwd: ${prepare_worktree.worktree_path}
              parameters:
                binary_path: ${normalized_input.binary_path}
                package: ${normalized_input.binary_package}
        transitions:
          - trigger: succeeded
            to: invoke_binary
      - id: invoke_binary
        on_entry:
          - id: invoke_binary
            uses: command.execute
            with:
              template_id: binary_execute_two_args
              cwd: ${prepare_worktree.worktree_path}
              parameters:
                binary_path: ${normalized_input.binary_path}
                arg_1: ${normalized_input.binary_arg_1}
                arg_2: ${normalized_input.binary_arg_2}
    transitions:
      - trigger: succeeded
        to: publish_for_review
      - trigger: failed
        to: operator_review

  - id: publish_for_review
    on_entry:
      - id: commit_change
        uses: mcp.call
        with:
          server_id: sourcecontrol
          tool: sourcecontrol.commit
          arguments:
            worktree_path: ${prepare_worktree.worktree_path}
            message: ${normalized_input.commit_message}
      - id: push_branch
        uses: mcp.call
        with:
          server_id: sourcecontrol
          tool: sourcecontrol.push
          arguments:
            worktree_path: ${prepare_worktree.worktree_path}
            remote: ${normalized_input.remote}
            branch: ${prepare_worktree.branch}
    transitions:
      - trigger: succeeded
        to: review_ready
      - trigger: failed
        to: operator_review

  - id: operator_review
    on_entry:
      - id: request_operator_review
        uses: human.request
        with:
          prompt: The coding workflow stopped before publishing. Review the captured run state, repair the worktree if needed, then start a new run.
          payload:
            worktree: ${prepare_worktree}
            implementation: ${implement_change}
            build: ${go_build_all}
            test: ${go_test_all}
            binary_build: ${go_build_binary}
            binary_invoke: ${invoke_binary}
            commit: ${commit_change}
            push: ${push_branch}

  - id: review_ready
