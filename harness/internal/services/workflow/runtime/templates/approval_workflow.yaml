id: approval_workflow
name: Approval Workflow
description: Start from a pipe graph that asks for user approval.
category: approval
tags:
  - human
  - workflow
  - approval
parameters:
  - id: prompt
    label: Approval prompt
    type: string
    default: Review and approve this automation.
requirements:
  actions:
    - human.request
body:
  apiVersion: aa.workflow/v1
  kind: workflow
  id: approval_workflow
  name: Approval Workflow
  description: A human approval workflow.
  nodes:
    - id: review
      type: human
      with:
        prompt: "{{prompt}}"
