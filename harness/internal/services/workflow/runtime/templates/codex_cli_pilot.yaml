id: codex_cli_pilot
name: Codex CLI Pilot
description: Plan, implement, test, review, clean up, commit, push, and open a PR through generic boundaries.
category: source_control
tags:
  - codex
  - command
  - sourcecontrol
  - state-machine
parameters:
  - id: sourcecontrol_mcp_endpoint
    label: Source-control MCP endpoint
    type: string
    default: http://127.0.0.1:8095/mcp
requirements:
  actions:
    - mcp.call
    - command.execute
    - data.assert
    - human.request
  input:
    - repository_path
    - worktree_path
    - branch
    - base_ref
    - remote
    - commit_message
body:
  kind: state_machine
  id: codex_cli_pilot
  name: Codex CLI Pilot
  description: Generic Codex CLI pilot workflow.
  initial: intake
  states:
    - id: intake
      initial: assert_request
      states:
        - id: assert_request
          on_entry:
            - id: assert_request
              uses: data.assert
              with:
                checks:
                  - path: workflow_input.repository_path
                    mode: exists
                  - path: workflow_input.worktree_path
                    mode: exists
                  - path: workflow_input.branch
                    mode: exists
                  - path: workflow_input.base_ref
                    mode: exists
                  - path: workflow_input.commit_message
                    mode: exists
          transitions:
            - trigger: succeeded
              to: request_approval
            - trigger: failed
              to: blocked
        - id: request_approval
          on_entry:
            - id: request_approval
              uses: human.request
              with:
                prompt: Approve starting the coding change workflow?
                payload:
                  workflow: codex_cli_pilot
          transitions:
            - trigger: approved
              to: preparation
            - trigger: rejected
              to: blocked
      transitions:
        - trigger: failed
          to: blocked
    - id: preparation
      initial: prepare
      states:
        - id: prepare
          on_entry:
            - id: prepare
              uses: mcp.call
              with:
                endpoint: "{{sourcecontrol_mcp_endpoint}}"
                tool: sourcecontrol.prepare_worktree
                arguments:
                  repository_path: "${workflow_input.repository_path}"
                  worktree_path: "${workflow_input.worktree_path}"
                  branch: "${workflow_input.branch}"
                  base_ref: "${workflow_input.base_ref}"
          transitions:
            - trigger: succeeded
              to: plan
            - trigger: failed
              to: blocked
        - id: plan
          on_entry:
            - id: plan
              uses: command.execute
              with:
                template_id: codex_plan
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: assert_plan
            - trigger: failed
              to: blocked
        - id: assert_plan
          on_entry:
            - id: assert_plan
              uses: data.assert
              with:
                checks:
                  - path: plan.output.plan.compliant
                    mode: equals
                    value: true
                  - path: plan.output.plan.project_conventions
                    mode: equals
                    value: true
                  - path: plan.output.plan.solid
                    mode: equals
                    value: true
                  - path: plan.output.plan.agents
                    mode: equals
                    value: true
                  - path: plan.output.plan.relevant_skills
                    mode: equals
                    value: true
                  - path: plan.output.plan.no_unnecessary_backwards_compatibility
                    mode: equals
                    value: true
                  - path: plan.output.plan.no_duplicate_implementations
                    mode: equals
                    value: true
                  - path: plan.output.plan.no_hardcoded_values
                    mode: equals
                    value: true
          transitions:
            - trigger: succeeded
              to: backup
            - trigger: failed
              to: blocked
        - id: backup
          on_entry:
            - id: backup
              uses: mcp.call
              with:
                endpoint: "{{sourcecontrol_mcp_endpoint}}"
                tool: sourcecontrol.backup
                arguments:
                  worktree_path: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: change
            - trigger: failed
              to: blocked
      transitions:
        - trigger: failed
          to: blocked
    - id: change
      initial: implement
      states:
        - id: implement
          on_entry:
            - id: implement
              uses: command.execute
              with:
                template_id: codex_implement
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: assert_implement
            - trigger: failed
              to: blocked
        - id: assert_implement
          on_entry:
            - id: assert_implement
              uses: data.assert
              with:
                checks:
                  - path: implement.status
                    mode: equals
                    value: succeeded
                  - path: implement.validation.valid
                    mode: equals
                    value: true
          transitions:
            - trigger: succeeded
              to: quality_loop
            - trigger: failed
              to: blocked
      transitions:
        - trigger: failed
          to: blocked
    - id: quality_loop
      initial: test
      states:
        - id: test
          on_entry:
            - id: test
              uses: command.execute
              with:
                template_id: test
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: assert_tests
            - trigger: failed
              to: blocked
        - id: assert_tests
          on_entry:
            - id: assert_tests
              uses: data.assert
              with:
                checks:
                  - path: test.status
                    mode: equals
                    value: succeeded
                  - path: test.output.passed
                    mode: equals
                    value: true
          transitions:
            - trigger: succeeded
              to: post_review
            - trigger: failed
              to: blocked
        - id: post_review
          on_entry:
            - id: post_review
              uses: command.execute
              with:
                template_id: codex_review
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: cleanup
            - trigger: failed
              to: blocked
        - id: cleanup
          on_entry:
            - id: cleanup
              uses: command.execute
              with:
                template_id: codex_cleanup
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: assert_cleanup
            - trigger: failed
              to: blocked
        - id: assert_cleanup
          on_entry:
            - id: assert_cleanup
              uses: data.assert
              with:
                checks:
                  - path: cleanup.status
                    mode: equals
                    value: succeeded
                  - path: cleanup.validation.valid
                    mode: equals
                    value: true
          transitions:
            - trigger: succeeded
              to: retest
            - trigger: failed
              to: blocked
        - id: retest
          on_entry:
            - id: retest
              uses: command.execute
              with:
                template_id: test
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: assert_retest
            - trigger: failed
              to: blocked
        - id: assert_retest
          on_entry:
            - id: assert_retest
              uses: data.assert
              with:
                checks:
                  - path: retest.status
                    mode: equals
                    value: succeeded
                  - path: retest.output.passed
                    mode: equals
                    value: true
          transitions:
            - trigger: succeeded
              to: final_review
            - trigger: failed
              to: blocked
        - id: final_review
          on_entry:
            - id: final_review
              uses: command.execute
              with:
                template_id: codex_review
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: assert_review
            - trigger: failed
              to: blocked
        - id: assert_review
          on_entry:
            - id: assert_review
              uses: data.assert
              with:
                checks:
                  - path: final_review.output.deviations
                    mode: equals
                    value: []
          transitions:
            - trigger: succeeded
              to: publish
            - trigger: failed
              to: blocked
      transitions:
        - trigger: failed
          to: blocked
    - id: publish
      initial: commit
      states:
        - id: commit
          on_entry:
            - id: commit
              uses: mcp.call
              with:
                endpoint: "{{sourcecontrol_mcp_endpoint}}"
                tool: sourcecontrol.commit
                arguments:
                  worktree_path: "${prepare.worktree_path}"
                  message: "${workflow_input.commit_message}"
          transitions:
            - trigger: succeeded
              to: push
            - trigger: failed
              to: blocked
        - id: push
          on_entry:
            - id: push
              uses: mcp.call
              with:
                endpoint: "{{sourcecontrol_mcp_endpoint}}"
                tool: sourcecontrol.push
                arguments:
                  worktree_path: "${prepare.worktree_path}"
                  remote: "${workflow_input.remote}"
                  branch: "${workflow_input.branch}"
          transitions:
            - trigger: succeeded
              to: open_pr
            - trigger: failed
              to: blocked
        - id: open_pr
          on_entry:
            - id: open_pr
              uses: command.execute
              with:
                template_id: gh_pr_create
                cwd: "${prepare.worktree_path}"
          transitions:
            - trigger: succeeded
              to: assert_pr
            - trigger: failed
              to: blocked
        - id: assert_pr
          on_entry:
            - id: assert_pr
              uses: data.assert
              with:
                checks:
                  - path: open_pr.output.url
                    mode: exists
          transitions:
            - trigger: succeeded
              to: terminal
            - trigger: failed
              to: blocked
      transitions:
        - trigger: failed
          to: blocked
    - id: blocked
    - id: terminal
