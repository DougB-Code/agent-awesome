name: Linux Tools
local-exec:
  enabled: true
  default-timeout: 30s
  default-max-output-bytes: 1048576
  commands:
    - name: curl
      executable: curl
      description: Transfer data to or from URLs.
      surface:
        global-flags:
          - name: -f
            description: Fail on HTTP server errors.
          - name: -L
            description: Follow redirects.
          - name: -s
            description: Run silently except for output.
          - name: -o
            description: Write response body to a file path.
      operations:
        - name: http_get
          description: Fetch one URL and return the response body.
          args:
            - -fsSL
            - "{{url}}"
          input-schema:
            type: object
            required:
              - url
            properties:
              url:
                type: string
          output:
            format: text
            source: stdout
        - name: download_file
          description: Download one URL to a selected output path.
          args:
            - -fsSL
            - -o
            - "{{output_path}}"
            - "{{url}}"
          input-schema:
            type: object
            required:
              - url
              - output_path
            properties:
              url:
                type: string
              output_path:
                type: string
          output:
            format: text
            source: stderr
    - name: jq
      executable: jq
      description: Filter, transform, and validate JSON documents.
      surface:
        global-flags:
          - name: -c
            description: Emit compact JSON output.
          - name: -r
            description: Emit raw strings instead of JSON strings.
          - name: -e
            description: Set the exit status from the filter result.
      operations:
        - name: query_file
          description: Run a jq filter against one JSON file.
          args:
            - -c
            - "{{filter}}"
            - "{{input_path}}"
          input-schema:
            type: object
            required:
              - filter
              - input_path
            properties:
              filter:
                type: string
              input_path:
                type: string
          output:
            format: text
            source: stdout
        - name: validate_file
          description: Validate that one file is parseable JSON.
          args:
            - -e
            - empty
            - "{{input_path}}"
          input-schema:
            type: object
            required:
              - input_path
            properties:
              input_path:
                type: string
          output:
            format: text
            source: stdout
    - name: yq
      executable: yq
      description: Read and query YAML documents with JSON output.
      surface:
        global-flags:
          - name: -o
            description: Select the output format.
          - name: -e
            description: Set the exit status from the expression result.
      operations:
        - name: read_file
          description: Read one YAML file through a yq expression and return JSON.
          args:
            - -o=json
            - "{{expression}}"
            - "{{input_path}}"
          input-schema:
            type: object
            required:
              - expression
              - input_path
            properties:
              expression:
                type: string
              input_path:
                type: string
          output:
            format: json
            source: stdout
    - name: pdftotext
      executable: pdftotext
      description: Extract text from PDF documents.
      surface:
        global-flags:
          - name: -layout
            description: Preserve the original physical page layout where possible.
          - name: "-"
            description: Write extracted text to standard output.
      operations:
        - name: extract_text
          description: Extract text from one PDF file and return it as plain text.
          args:
            - -layout
            - "{{input_path}}"
            - "-"
          input-schema:
            type: object
            required:
              - input_path
            properties:
              input_path:
                type: string
          output:
            format: text
            source: stdout
    - name: libreoffice
      executable: libreoffice
      description: Convert office documents and spreadsheets through LibreOffice headless mode.
      surface:
        global-flags:
          - name: --headless
            description: Run without opening a desktop window.
          - name: --convert-to
            description: Select the output format.
          - name: --outdir
            description: Write converted files into the selected directory.
      operations:
        - name: document_to_text
          description: Convert one Word-compatible document into a text file in the selected output directory.
          args:
            - --headless
            - --convert-to
            - txt:Text
            - --outdir
            - "{{output_dir}}"
            - "{{input_path}}"
          input-schema:
            type: object
            required:
              - input_path
              - output_dir
            properties:
              input_path:
                type: string
              output_dir:
                type: string
          output:
            format: text
            source: combined
        - name: spreadsheet_to_csv
          description: Convert one Excel-compatible spreadsheet into a CSV file in the selected output directory.
          args:
            - --headless
            - --convert-to
            - csv
            - --outdir
            - "{{output_dir}}"
            - "{{input_path}}"
          input-schema:
            type: object
            required:
              - input_path
              - output_dir
            properties:
              input_path:
                type: string
              output_dir:
                type: string
          output:
            format: text
            source: combined
    - name: rg
      executable: rg
      description: Search files recursively with ripgrep.
      surface:
        global-flags:
          - name: --line-number
            description: Include line numbers.
          - name: --column
            description: Include column numbers.
          - name: --glob
            description: Include or exclude paths with a glob.
          - name: --files
            description: Print files that would be searched.
      operations:
        - name: search_text
          description: Search a path for a text pattern with line and column numbers.
          args:
            - --line-number
            - --column
            - "{{pattern}}"
            - "{{path}}"
          input-schema:
            type: object
            required:
              - pattern
              - path
            properties:
              pattern:
                type: string
              path:
                type: string
          output:
            format: text
            source: stdout
        - name: list_files
          description: List searchable files under a path.
          args:
            - --files
            - "{{path}}"
          input-schema:
            type: object
            required:
              - path
            properties:
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: find
      executable: find
      description: Traverse directory trees and select paths by predicates.
      surface:
        global-flags:
          - name: -name
            description: Match a filename pattern.
          - name: -type
            description: Restrict matches to a filesystem entry type.
          - name: -maxdepth
            description: Limit traversal depth.
      operations:
        - name: by_name
          description: Find paths under a root that match a filename pattern.
          args:
            - "{{root}}"
            - -name
            - "{{name_pattern}}"
            - -print
          input-schema:
            type: object
            required:
              - root
              - name_pattern
            properties:
              root:
                type: string
              name_pattern:
                type: string
          output:
            format: text
            source: stdout
        - name: files_by_name
          description: Find files under a root that match a filename pattern.
          args:
            - "{{root}}"
            - -type
            - f
            - -name
            - "{{name_pattern}}"
            - -print
          input-schema:
            type: object
            required:
              - root
              - name_pattern
            properties:
              root:
                type: string
              name_pattern:
                type: string
          output:
            format: text
            source: stdout
    - name: grep
      executable: grep
      description: Search text files for matching lines.
      surface:
        global-flags:
          - name: -R
            description: Search directories recursively.
          - name: -n
            description: Prefix matching lines with line numbers.
          - name: -i
            description: Ignore case.
      operations:
        - name: recursive_search
          description: Recursively search a path and return matching lines.
          args:
            - -R
            - -n
            - "{{pattern}}"
            - "{{path}}"
          input-schema:
            type: object
            required:
              - pattern
              - path
            properties:
              pattern:
                type: string
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: tar
      executable: tar
      description: Create, list, and extract tar archives.
      surface:
        global-flags:
          - name: -t
            description: List archive contents.
          - name: -c
            description: Create an archive.
          - name: -f
            description: Use the following archive file path.
      operations:
        - name: list_archive
          description: List the contents of a tar archive.
          args:
            - -tf
            - "{{archive_path}}"
          input-schema:
            type: object
            required:
              - archive_path
            properties:
              archive_path:
                type: string
          output:
            format: text
            source: stdout
        - name: create_archive
          description: Create a tar archive from selected source paths.
          args:
            - -cf
            - "{{archive_path}}"
            - "{{sources}}"
          input-schema:
            type: object
            required:
              - archive_path
              - sources
            properties:
              archive_path:
                type: string
              sources:
                type: array
                items:
                  type: string
          output:
            format: text
            source: stderr
    - name: du
      executable: du
      description: Summarize filesystem space used by paths.
      surface:
        global-flags:
          - name: -s
            description: Report only a total for each argument.
          - name: -k
            description: Report sizes in kibibytes.
          - name: -h
            description: Report human-readable sizes.
      operations:
        - name: summarize_path
          description: Report total disk usage for one path in kibibytes.
          args:
            - -sk
            - "{{path}}"
          input-schema:
            type: object
            required:
              - path
            properties:
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: df
      executable: df
      description: Report filesystem disk space usage.
      surface:
        global-flags:
          - name: -P
            description: Use portable POSIX output format.
          - name: -h
            description: Report human-readable sizes.
      operations:
        - name: filesystem_usage
          description: Report filesystem usage for one path in portable format.
          args:
            - -P
            - "{{path}}"
          input-schema:
            type: object
            required:
              - path
            properties:
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: ps
      executable: ps
      description: Report current process information.
      surface:
        global-flags:
          - name: -e
            description: Select all processes.
          - name: -o
            description: Select output columns.
      operations:
        - name: list_processes
          description: List processes with pid, parent pid, state, command, and arguments.
          args:
            - -eo
            - pid,ppid,stat,comm,args
          input-schema:
            type: object
          output:
            format: text
            source: stdout
    - name: netstat
      executable: netstat
      description: Show network connections, routing tables, and interface statistics.
      surface:
        global-flags:
          - name: -t
            description: Show TCP sockets.
          - name: -u
            description: Show UDP sockets.
          - name: -l
            description: Show listening sockets.
          - name: -n
            description: Show numeric addresses and ports.
      operations:
        - name: listening_ports
          description: List listening TCP and UDP sockets with numeric addresses.
          args:
            - -tuln
          input-schema:
            type: object
          output:
            format: text
            source: stdout
    - name: kubectl
      executable: kubectl
      description: Inspect and manage Kubernetes resources through documented kubectl commands.
      surface:
        global-flags:
          - name: --context
            description: Select the kubeconfig context to use.
          - name: --namespace
            description: Select the namespace scope for namespaced resources.
          - name: --kubeconfig
            description: Use a specific kubeconfig file.
          - name: --request-timeout
            description: Set the length of time to wait before giving up on one server request.
        subcommands:
          - name: get
            description: Display one or many resources.
            flags:
              - name: --output
                description: Select output format such as json, yaml, wide, or name.
              - name: --selector
                description: Filter resources by label selector.
              - name: --watch
                description: Watch for changes after listing the requested object.
            subcommands:
              - name: pod
                description: Display pods.
              - name: deployment
                description: Display deployments.
              - name: service
                description: Display services.
          - name: describe
            description: Show details for a resource or group of resources.
            flags:
              - name: --selector
                description: Filter resources by label selector.
            subcommands:
              - name: pod
                description: Show details for pods.
              - name: node
                description: Show details for nodes.
          - name: create
            description: Create a resource from a file, stdin, or supported generator subcommands.
            flags:
              - name: --filename
                description: Filename, directory, or URL containing resources to create.
              - name: --dry-run
                description: Print or submit the object without persisting it.
            subcommands:
              - name: secret
                description: Create a secret.
                subcommands:
                  - name: docker-registry
                    description: Create a Docker registry secret.
                  - name: generic
                    description: Create a generic secret from files, directories, or literal values.
                  - name: tls
                    description: Create a TLS secret.
              - name: service
                description: Create a service.
                subcommands:
                  - name: clusterip
                    description: Create a ClusterIP service.
                  - name: loadbalancer
                    description: Create a LoadBalancer service.
                  - name: nodeport
                    description: Create a NodePort service.
          - name: rollout
            description: Manage rollout state for workload resources.
            subcommands:
              - name: status
                description: Watch rollout status until completion.
              - name: restart
                description: Restart a resource.
              - name: undo
                description: Roll back to a previous rollout.
          - name: config
            description: Modify kubeconfig files.
            subcommands:
              - name: current-context
                description: Display the current context.
              - name: get-contexts
                description: List available contexts.
              - name: set-context
                description: Set one context entry in kubeconfig.
              - name: use-context
                description: Set the current context.
          - name: auth
            description: Inspect authorization.
            subcommands:
              - name: can-i
                description: Check whether an action is allowed.
          - name: alpha
            description: Preview alpha kubectl commands that may change without notice.
            subcommands:
              - name: control-plane-topology
                description: Inspect Kubernetes control plane topology information.
                subcommands:
                  - name: view
                    description: View the control plane topology.
      operations:
        - name: version_client
          description: Print the local kubectl client version as JSON.
          args:
            - version
            - --client=true
            - --output=json
          input-schema:
            type: object
          output:
            format: json
            source: stdout
validations:
  - id: curl_http_get_mocked
    label: curl HTTP GET
    mode: mocked
    target:
      type: command-operation
      command: curl
      operation: http_get
    input:
      url: http://127.0.0.1:8080/health
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: ok
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: ok
  - id: curl_download_file_mocked
    label: curl download file
    mode: mocked
    target:
      type: command-operation
      command: curl
      operation: download_file
    input:
      url: http://127.0.0.1:8080/report.txt
      output_path: report.txt
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stderr: downloaded report.txt
    expected:
      status: succeeded
    assertions:
      - type: stderr-contains
        contains: report.txt
  - id: jq_query_file_mocked
    label: jq query file
    mode: mocked
    target:
      type: command-operation
      command: jq
      operation: query_file
    input:
      filter: .status
      input_path: response.json
    fixtures:
      files:
        - path: response.json
          content: '{"status":"ok"}'
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: '"ok"'
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: ok
  - id: jq_validate_file_mocked
    label: jq validate file
    mode: mocked
    target:
      type: command-operation
      command: jq
      operation: validate_file
    input:
      input_path: response.json
    fixtures:
      files:
        - path: response.json
          content: '{"status":"ok"}'
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: valid
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: valid
  - id: yq_read_file_mocked
    label: yq read file
    mode: mocked
    target:
      type: command-operation
      command: yq
      operation: read_file
    input:
      expression: .
      input_path: status.yaml
    fixtures:
      files:
        - path: status.yaml
          content: "ok: true\n"
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: '{"ok":true}'
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: ok
  - id: pdftotext_extract_text_mocked
    label: PDF text extraction
    mode: mocked
    target:
      type: command-operation
      command: pdftotext
      operation: extract_text
    input:
      input_path: report.pdf
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: Quarterly report
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: Quarterly report
  - id: libreoffice_document_to_text_mocked
    label: Word document text conversion
    mode: mocked
    target:
      type: command-operation
      command: libreoffice
      operation: document_to_text
    input:
      input_path: notes.docx
      output_dir: build/text
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: notes.txt
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: notes.txt
  - id: libreoffice_spreadsheet_to_csv_mocked
    label: Excel spreadsheet CSV conversion
    mode: mocked
    target:
      type: command-operation
      command: libreoffice
      operation: spreadsheet_to_csv
    input:
      input_path: budget.xlsx
      output_dir: build/text
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: budget.csv
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: budget.csv
  - id: rg_search_text_mocked
    label: ripgrep search text
    mode: mocked
    target:
      type: command-operation
      command: rg
      operation: search_text
    input:
      pattern: TODO
      path: .
    fixtures:
      files:
        - path: notes.txt
          content: TODO write docs
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: notes.txt:1:1:TODO write docs
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: TODO
  - id: rg_list_files_mocked
    label: ripgrep list files
    mode: mocked
    target:
      type: command-operation
      command: rg
      operation: list_files
    input:
      path: .
    fixtures:
      files:
        - path: notes.txt
          content: searchable
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: notes.txt
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: notes.txt
  - id: find_by_name_mocked
    label: find by name
    mode: mocked
    target:
      type: command-operation
      command: find
      operation: by_name
    input:
      root: .
      name_pattern: README.md
    fixtures:
      files:
        - path: README.md
          content: "# Example"
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: ./README.md
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: README.md
  - id: find_files_by_name_mocked
    label: find files by name
    mode: mocked
    target:
      type: command-operation
      command: find
      operation: files_by_name
    input:
      root: .
      name_pattern: "*.md"
    fixtures:
      files:
        - path: README.md
          content: "# Example"
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: ./README.md
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: README.md
  - id: grep_recursive_search_mocked
    label: grep recursive search
    mode: mocked
    target:
      type: command-operation
      command: grep
      operation: recursive_search
    input:
      pattern: needle
      path: .
    fixtures:
      files:
        - path: haystack.txt
          content: needle
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: ./haystack.txt:1:needle
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: needle
  - id: tar_list_archive_mocked
    label: tar list archive
    mode: mocked
    target:
      type: command-operation
      command: tar
      operation: list_archive
    input:
      archive_path: bundle.tar
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: README.md
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: README.md
  - id: tar_create_archive_mocked
    label: tar create archive
    mode: mocked
    target:
      type: command-operation
      command: tar
      operation: create_archive
    input:
      archive_path: bundle.tar
      sources:
        - README.md
    fixtures:
      files:
        - path: README.md
          content: "# Example"
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stderr: created bundle.tar
    expected:
      status: succeeded
    assertions:
      - type: stderr-contains
        contains: bundle.tar
  - id: du_summarize_path_mocked
    label: du summarize path
    mode: mocked
    target:
      type: command-operation
      command: du
      operation: summarize_path
    input:
      path: .
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: "4\t."
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: .
  - id: df_filesystem_usage_mocked
    label: df filesystem usage
    mode: mocked
    target:
      type: command-operation
      command: df
      operation: filesystem_usage
    input:
      path: .
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: Filesystem 1024-blocks Used Available Capacity Mounted on
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: Filesystem
  - id: ps_list_processes_mocked
    label: ps list processes
    mode: mocked
    target:
      type: command-operation
      command: ps
      operation: list_processes
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: PID PPID STAT COMMAND COMMAND
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: PID
  - id: netstat_listening_ports_mocked
    label: netstat listening ports
    mode: mocked
    target:
      type: command-operation
      command: netstat
      operation: listening_ports
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: tcp 0 0 127.0.0.1:8080 0.0.0.0:* LISTEN
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: LISTEN
  - id: kubectl_version_client_mocked
    label: kubectl client version
    mode: mocked
    target:
      type: command-operation
      command: kubectl
      operation: version_client
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: '{"clientVersion":{"gitVersion":"v1.34.0"}}'
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: clientVersion
  - id: curl_http_get_agent_mocked
    label: agent selects curl HTTP GET
    mode: mocked
    prompt: Fetch the health endpoint and return the response body.
    target:
      type: agent-tool-call
      command: curl
      operation: http_get
    mocks:
      agent.tool_call:
        status: succeeded
        output:
          tool_name: command_execute
          arguments:
            template_id: curl.http_get
            parameters:
              url: http://127.0.0.1:8080/health
    expected:
      status: succeeded
