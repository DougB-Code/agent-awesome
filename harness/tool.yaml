name: Linux Tools
local-exec:
  enabled: true
  default-timeout: 30s
  default-max-output-bytes: 1048576
  commands:
    - name: curl
      executable: curl
      description: Transfer data to or from URLs.
      surface:
        global-flags:
          - name: -f
            description: Fail on HTTP server errors.
          - name: -L
            description: Follow redirects.
          - name: -s
            description: Run silently except for output.
          - name: -o
            description: Write response body to a file path.
      operations:
        - name: http_get
          description: Fetch one URL and return the response body.
          args:
            - -fsSL
            - "{{url}}"
          input-schema:
            type: object
            required:
              - url
            properties:
              url:
                type: string
          output:
            format: text
            source: stdout
        - name: download_file
          description: Download one URL to a selected output path.
          args:
            - -fsSL
            - -o
            - "{{output_path}}"
            - "{{url}}"
          input-schema:
            type: object
            required:
              - url
              - output_path
            properties:
              url:
                type: string
              output_path:
                type: string
          output:
            format: text
            source: stderr
    - name: jq
      executable: jq
      description: Filter, transform, and validate JSON documents.
      surface:
        global-flags:
          - name: -c
            description: Emit compact JSON output.
          - name: -r
            description: Emit raw strings instead of JSON strings.
          - name: -e
            description: Set the exit status from the filter result.
      operations:
        - name: query_file
          description: Run a jq filter against one JSON file.
          args:
            - -c
            - "{{filter}}"
            - "{{input_path}}"
          input-schema:
            type: object
            required:
              - filter
              - input_path
            properties:
              filter:
                type: string
              input_path:
                type: string
          output:
            format: text
            source: stdout
        - name: validate_file
          description: Validate that one file is parseable JSON.
          args:
            - -e
            - empty
            - "{{input_path}}"
          input-schema:
            type: object
            required:
              - input_path
            properties:
              input_path:
                type: string
          output:
            format: text
            source: stdout
    - name: rg
      executable: rg
      description: Search files recursively with ripgrep.
      surface:
        global-flags:
          - name: --line-number
            description: Include line numbers.
          - name: --column
            description: Include column numbers.
          - name: --glob
            description: Include or exclude paths with a glob.
          - name: --files
            description: Print files that would be searched.
      operations:
        - name: search_text
          description: Search a path for a text pattern with line and column numbers.
          args:
            - --line-number
            - --column
            - "{{pattern}}"
            - "{{path}}"
          input-schema:
            type: object
            required:
              - pattern
              - path
            properties:
              pattern:
                type: string
              path:
                type: string
          output:
            format: text
            source: stdout
        - name: list_files
          description: List searchable files under a path.
          args:
            - --files
            - "{{path}}"
          input-schema:
            type: object
            required:
              - path
            properties:
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: find
      executable: find
      description: Traverse directory trees and select paths by predicates.
      surface:
        global-flags:
          - name: -name
            description: Match a filename pattern.
          - name: -type
            description: Restrict matches to a filesystem entry type.
          - name: -maxdepth
            description: Limit traversal depth.
      operations:
        - name: by_name
          description: Find paths under a root that match a filename pattern.
          args:
            - "{{root}}"
            - -name
            - "{{name_pattern}}"
            - -print
          input-schema:
            type: object
            required:
              - root
              - name_pattern
            properties:
              root:
                type: string
              name_pattern:
                type: string
          output:
            format: text
            source: stdout
        - name: files_by_name
          description: Find files under a root that match a filename pattern.
          args:
            - "{{root}}"
            - -type
            - f
            - -name
            - "{{name_pattern}}"
            - -print
          input-schema:
            type: object
            required:
              - root
              - name_pattern
            properties:
              root:
                type: string
              name_pattern:
                type: string
          output:
            format: text
            source: stdout
    - name: grep
      executable: grep
      description: Search text files for matching lines.
      surface:
        global-flags:
          - name: -R
            description: Search directories recursively.
          - name: -n
            description: Prefix matching lines with line numbers.
          - name: -i
            description: Ignore case.
      operations:
        - name: recursive_search
          description: Recursively search a path and return matching lines.
          args:
            - -R
            - -n
            - "{{pattern}}"
            - "{{path}}"
          input-schema:
            type: object
            required:
              - pattern
              - path
            properties:
              pattern:
                type: string
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: tar
      executable: tar
      description: Create, list, and extract tar archives.
      surface:
        global-flags:
          - name: -t
            description: List archive contents.
          - name: -c
            description: Create an archive.
          - name: -f
            description: Use the following archive file path.
      operations:
        - name: list_archive
          description: List the contents of a tar archive.
          args:
            - -tf
            - "{{archive_path}}"
          input-schema:
            type: object
            required:
              - archive_path
            properties:
              archive_path:
                type: string
          output:
            format: text
            source: stdout
        - name: create_archive
          description: Create a tar archive from selected source paths.
          args:
            - -cf
            - "{{archive_path}}"
            - "{{sources}}"
          input-schema:
            type: object
            required:
              - archive_path
              - sources
            properties:
              archive_path:
                type: string
              sources:
                type: array
                items:
                  type: string
          output:
            format: text
            source: stderr
    - name: du
      executable: du
      description: Summarize filesystem space used by paths.
      surface:
        global-flags:
          - name: -s
            description: Report only a total for each argument.
          - name: -k
            description: Report sizes in kibibytes.
          - name: -h
            description: Report human-readable sizes.
      operations:
        - name: summarize_path
          description: Report total disk usage for one path in kibibytes.
          args:
            - -sk
            - "{{path}}"
          input-schema:
            type: object
            required:
              - path
            properties:
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: df
      executable: df
      description: Report filesystem disk space usage.
      surface:
        global-flags:
          - name: -P
            description: Use portable POSIX output format.
          - name: -h
            description: Report human-readable sizes.
      operations:
        - name: filesystem_usage
          description: Report filesystem usage for one path in portable format.
          args:
            - -P
            - "{{path}}"
          input-schema:
            type: object
            required:
              - path
            properties:
              path:
                type: string
          output:
            format: text
            source: stdout
    - name: ps
      executable: ps
      description: Report current process information.
      surface:
        global-flags:
          - name: -e
            description: Select all processes.
          - name: -o
            description: Select output columns.
      operations:
        - name: list_processes
          description: List processes with pid, parent pid, state, command, and arguments.
          args:
            - -eo
            - pid,ppid,stat,comm,args
          input-schema:
            type: object
          output:
            format: text
            source: stdout
    - name: netstat
      executable: netstat
      description: Show network connections, routing tables, and interface statistics.
      surface:
        global-flags:
          - name: -t
            description: Show TCP sockets.
          - name: -u
            description: Show UDP sockets.
          - name: -l
            description: Show listening sockets.
          - name: -n
            description: Show numeric addresses and ports.
      operations:
        - name: listening_ports
          description: List listening TCP and UDP sockets with numeric addresses.
          args:
            - -tuln
          input-schema:
            type: object
          output:
            format: text
            source: stdout
validations:
  - id: curl_http_get_mocked
    label: curl HTTP GET
    mode: mocked
    target:
      type: command-operation
      command: curl
      operation: http_get
    input:
      url: http://127.0.0.1:8080/health
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: ok
    expected:
      status: succeeded
    assertions:
      - type: stdout-contains
        contains: ok
  - id: curl_download_file_mocked
    label: curl download file
    mode: mocked
    target:
      type: command-operation
      command: curl
      operation: download_file
    input:
      url: http://127.0.0.1:8080/report.txt
      output_path: report.txt
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stderr: downloaded report.txt
    expected:
      status: succeeded
    assertions:
      - type: stderr-contains
        contains: report.txt
  - id: jq_query_file_mocked
    label: jq query file
    mode: mocked
    target:
      type: command-operation
      command: jq
      operation: query_file
    input:
      filter: .status
      input_path: response.json
    fixtures:
      files:
        - path: response.json
          content: '{"status":"ok"}'
    mocks:
      command.execute:
        status: succeeded
        exit_code: 0
        stdout: '"ok"'
    expected:
