# This file configures runbook control tools for Agent Awesome.
local-exec:
  enabled: false
  default-timeout: 10s
  default-max-output-bytes: 65536
mcp:
  enabled: true
  servers:
    - name: memory
      transport: streamable-http
      endpoint: http://127.0.0.1:8090/mcp
      require-confirmation-tools:
        - remember
        - save_memory_candidate
        - refresh_compiled_page
        - repair_memory_record
        - submit_memory_correction
        - query_context_graph
        - mutate_context_graph
        - create_task
        - update_task
        - upsert_codebase
        - complete_task
        - cancel_task
        - delete_task
        - delete_codebase
        - link_task_memory
        - upsert_task_relation
        - delete_task_relation
      tools:
        allow:
          - remember
          - save_memory_candidate
          - search_memory
          - search_sources
          - load_entity_page
          - load_timeline
          - refresh_compiled_page
          - repair_memory_record
          - submit_memory_correction
          - query_context_graph
          - mutate_context_graph
          - create_task
          - get_task
          - list_tasks
          - task_graph_projection
          - project_executive_summary
          - explain_executive_summary_item
          - upsert_codebase
          - get_codebase
          - list_codebases
          - resolve_codebase
          - delete_codebase
          - update_task
          - complete_task
          - cancel_task
          - delete_task
          - link_task_memory
          - list_task_relations
          - traverse_task_relations
          - upsert_task_relation
          - delete_task_relation
    - name: runbook
      transport: streamable-http
      endpoint: http://127.0.0.1:8092/mcp
      tools:
        allow:
          - runbook_list
          - runbook_describe
          - runbook_start
          - runbook_status
          - runbook_signal
          - runbook_cancel
          - runbook_history
          - runbook_action_types
          - runbook_draft_create
          - runbook_draft_update
          - runbook_draft_validate
          - runbook_draft_publish
    - name: launchpad
      transport: streamable-http
      endpoint: http://127.0.0.1:8092/api/launchpad/mcp
      tools:
        allow:
          - launchpad_list
          - launchpad_get
          - launchpad_start
          - coding_change_start
    - name: sourcecontrol
      transport: streamable-http
      endpoint: http://127.0.0.1:8095/mcp
      require-confirmation-tools:
        - sourcecontrol.commit
        - sourcecontrol.push
        - sourcecontrol.open_pull_request
        - sourcecontrol.restore
        - sourcecontrol.cleanup_worktree
      tools:
        allow:
          - sourcecontrol.inspect_repository
          - sourcecontrol.validate_repository
          - sourcecontrol.prepare_worktree
          - sourcecontrol.status
          - sourcecontrol.commit
          - sourcecontrol.push
          - sourcecontrol.open_pull_request
          - sourcecontrol.backup
          - sourcecontrol.restore
          - sourcecontrol.cleanup_worktree
memory:
  actor: agent:agent-awesome
  read-domains:
    - id: memory
      label: Memory
      endpoint: http://127.0.0.1:8090/mcp
  write-domains:
    - memory
  default-write-domain: memory
  allowed-sensitivities:
    - public
    - internal
    - private
node-presets:
  - id: sourcecontrol_prepare_worktree
    label: Prepare worktree
    surface: mcp
    action: mcp.call
    description: Prepare a source-control-managed Git worktree.
    arguments:
      server_id: sourcecontrol
      tool: sourcecontrol.prepare_worktree
  - id: sourcecontrol_commit
    label: Commit worktree
    surface: mcp
    action: mcp.call
    description: Commit changes in a prepared source-control worktree.
    arguments:
      server_id: sourcecontrol
      tool: sourcecontrol.commit
  - id: sourcecontrol_push
    label: Push branch
    surface: mcp
    action: mcp.call
    description: Push the prepared worktree branch to a configured remote.
    arguments:
      server_id: sourcecontrol
      tool: sourcecontrol.push
  - id: sourcecontrol_open_pull_request
    label: Open pull request
    surface: mcp
    action: mcp.call
    description: Open a pull request for a prepared source-control branch.
    arguments:
      server_id: sourcecontrol
      tool: sourcecontrol.open_pull_request
validations:
  - id: sourcecontrol_prepare_success
    label: Prepare success
    mode: mocked
    target:
      type: runbook-node
      preset-id: sourcecontrol_prepare_worktree
    description: Source-control boundary returns prepared branch metadata.
    input:
      repository_path: /tmp/repository
      branch_summary: example change
    mocks:
      mcp.call:
        status: succeeded
        body:
          value:
            branch: aa-example-change
            worktree_path: /tmp/worktree
    expected:
      status: succeeded

  - id: sourcecontrol_commit_runbook_mocked
    label: runbook invokes sourcecontrol commit
    mode: mocked
    target:
      type: runbook-node
      preset-id: sourcecontrol_commit
    mocks:
      mcp.call:
        status: succeeded
        output:
          preset: sourcecontrol_commit
    expected:
      status: succeeded
    assertions:
      - type: json-path
        path: output.preset
        equals: sourcecontrol_commit
  - id: sourcecontrol_push_runbook_mocked
    label: runbook invokes sourcecontrol push
    mode: mocked
