# This file configures local development tools for Agent Awesome.
local-exec:
  enabled: false
  allow-persistent-approvals: false
  default-timeout: 10s
  default-max-output-bytes: 65536
  allowed-workdirs:
    - .
  commands:
    - name: git_status
      executable: git
      description: Show repository status.
      args:
        - status
        - --short
      timeout: 5s
      max-output-bytes: 16384
      approval:
        always-allow-within-workspace: false
        always-allow-command-starts-with: []
        always-allow: false
mcp:
  enabled: true
  servers:
    - name: memory
      transport: streamable-http
      endpoint: http://127.0.0.1:8090/mcp
      require-confirmation-tools:
        - remember
        - save_memory_candidate
        - refresh_compiled_page
        - repair_memory_record
        - submit_memory_correction
        - query_context_graph
        - mutate_context_graph
        - create_task
        - update_task
        - complete_task
        - cancel_task
        - delete_task
        - link_task_memory
        - upsert_task_relation
        - delete_task_relation
      tools:
        allow:
          - remember
          - save_memory_candidate
          - search_memory
          - search_sources
          - load_entity_page
          - load_timeline
          - refresh_compiled_page
          - repair_memory_record
          - submit_memory_correction
          - query_context_graph
          - mutate_context_graph
          - create_task
          - get_task
          - list_tasks
          - task_graph_projection
          - project_executive_summary
          - explain_executive_summary_item
          - update_task
          - complete_task
          - cancel_task
          - delete_task
          - link_task_memory
          - list_task_relations
          - traverse_task_relations
          - upsert_task_relation
          - delete_task_relation
