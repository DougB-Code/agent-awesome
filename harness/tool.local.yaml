# This file configures default local tools for Agent Awesome.
local-exec:
  enabled: false
  default-timeout: 10s
  default-max-output-bytes: 65536
  allowed-workdirs:
    - .
  commands:
    - name: git_status
      executable: git
      description: Show repository status.
      args:
        - status
        - --short
      timeout: 5s
      max-output-bytes: 16384
mcp:
  enabled: true
  servers:
    - name: memory
      transport: streamable-http
      endpoint: http://127.0.0.1:8090/mcp
      require-confirmation-tools:
        - remember
        - save_memory_candidate
        - refresh_compiled_page
        - repair_memory_record
        - submit_memory_correction
        - query_context_graph
        - mutate_context_graph
        - create_task
        - update_task
        - upsert_codebase
        - complete_task
        - cancel_task
        - delete_task
        - delete_codebase
        - link_task_memory
        - upsert_task_relation
        - delete_task_relation
      tools:
        allow:
          - remember
          - save_memory_candidate
          - search_memory
          - search_sources
          - load_entity_page
          - load_timeline
          - refresh_compiled_page
          - repair_memory_record
          - submit_memory_correction
          - query_context_graph
          - mutate_context_graph
          - create_task
          - get_task
          - list_tasks
          - task_graph_projection
          - project_executive_summary
          - explain_executive_summary_item
          - upsert_codebase
          - get_codebase
          - list_codebases
          - resolve_codebase
          - delete_codebase
          - update_task
          - complete_task
          - cancel_task
          - delete_task
          - link_task_memory
          - list_task_relations
          - traverse_task_relations
          - upsert_task_relation
          - delete_task_relation
    - name: sourcecontrol
      transport: streamable-http
      endpoint: http://127.0.0.1:8095/mcp
      require-confirmation-tools:
        - sourcecontrol.commit
        - sourcecontrol.push
        - sourcecontrol.open_pull_request
        - sourcecontrol.restore
        - sourcecontrol.cleanup_worktree
      tools:
        allow:
          - sourcecontrol.inspect_repository
          - sourcecontrol.validate_repository
          - sourcecontrol.prepare_worktree
          - sourcecontrol.status
          - sourcecontrol.commit
          - sourcecontrol.push
          - sourcecontrol.open_pull_request
          - sourcecontrol.backup
          - sourcecontrol.restore
          - sourcecontrol.cleanup_worktree
    - name: operations
      transport: streamable-http
      endpoint: http://127.0.0.1:8092/api/operations/mcp
      tools:
        allow:
          - operation_list
          - operation_get
          - operation_start
          - coding_change_start
memory:
  actor: agent:agent-awesome
  read-domains:
    - id: memory
      label: Memory
      endpoint: http://127.0.0.1:8090/mcp
  write-domains:
    - memory
  default-write-domain: memory
  allowed-sensitivities:
    - public
    - internal
    - private
