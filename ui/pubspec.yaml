name: agentawesome_ui
description: Desktop-first Agent Awesome assistant workspace for Agent Awesome.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  file_selector: ^1.0.3
  http: ^1.5.0
  url_launcher: ^6.3.1
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  characters: ^1.4.1
  matcher: ^0.12.20
  material_color_utilities: ^0.13.0
  meta: ^1.18.2
  test_api: ^0.7.12
  vector_math: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/agent-awesome-logo.png
    - runtime_topology/agent_awesome.json
